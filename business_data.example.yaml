# business_data.example.yaml — шаблон чувствительных бизнес-данных проекта.
#
# Реальный файл — business_data.yaml (в .gitignore, синхронизируется через Dropbox).
# Не редактируй этот шаблон с реальными данными; он коммитится в публичный репозиторий.
#
# Применение:
#   python seed_business_data.py        # INSERT в legal_entities + backfill tasks.assignee_entity_id
#   python seed_business_data.py --dry  # показать SQL без выполнения
#
# Используется также tasks_importer.py для нормализации имён организаций.

# ─────────────────────────────────────────────────────────────────────────────
# Юридические лица — стороны договоров (заказчики, подрядчики, третьи стороны).
# Уникальность по ИНН.
# ─────────────────────────────────────────────────────────────────────────────
legal_entities:
  - short_code: ABC                        # короткий код, уникален; используется в путях, кодах задач
    name: 'ООО «Пример»'                   # полное наименование как в договоре
    inn: '0000000000'                      # 10 цифр для ООО, 12 для ИП
    kpp: null                              # 9 цифр или null
    ogrn: null
    address: '000000, г. Город, ул. Улица, д. 1'
    signatory_name: 'Иванов Иван Иванович' # ФИО подписанта
    signatory_position: 'Генеральный директор'
    aliases:                               # альтернативные написания для нормализации
      - 'ООО Пример'
      - 'ООО «Пример»'
      - Пример

# ─────────────────────────────────────────────────────────────────────────────
# Подрядчик (short_code) → коды объектов которые он ведёт.
# Используется tasks_importer.py для восстановления object_codes.
# ─────────────────────────────────────────────────────────────────────────────
contractor_to_objects:
  ABC: ['001_TYPE_VAL']

# ─────────────────────────────────────────────────────────────────────────────
# Подрядчик (short_code) → имя папки в ОБЯЗ. Obsidian (ПОДРЯДЧИКИ/<имя>/).
# Обратный маппинг — из чтения файла-протокола восстановить short_code.
# ─────────────────────────────────────────────────────────────────────────────
contractor_folder_to_code:
  ПримерПапка: ABC
